  <title>Hilo — Higher or Lower</title>
  <style>
    :root {
      --ink:#090611; --panel:#171126; --panel-2:#201336; --lime:#c8ff3d;
      --violet:#8b5cf6; --bright:#b04cff; --white:#f7f5ff;
      --muted:#aaa1bc; --danger:#ff5776;
    }
    * { box-sizing:border-box; }
    html { background:var(--ink); color-scheme:dark; }
    body {
      margin:0; min-width:320px; min-height:100svh; color:var(--white);
      background:var(--ink); font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    button,input { font:inherit; }
    button { -webkit-tap-highlight-color:transparent; }
    button:focus-visible,input:focus-visible { outline:3px solid var(--lime); outline-offset:3px; }
    .shell {
      min-height:100svh; position:relative; overflow:hidden; isolation:isolate;
      padding-bottom:max(24px,env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 12% 92%,rgba(139,92,246,.22),transparent 30%),
        radial-gradient(circle at 88% 12%,rgba(176,76,255,.17),transparent 27%),
        linear-gradient(135deg,#07040d 0%,#10071d 48%,#090611 100%);
    }
    .shell::before {
      content:""; position:fixed; inset:0; z-index:-2; opacity:.22; pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:42px 42px; mask-image:linear-gradient(to bottom,#000,transparent 82%);
    }
    .orb { position:fixed; width:380px; height:380px; border-radius:50%; filter:blur(100px); opacity:.13; z-index:-1; pointer-events:none; }
    .orb.one { top:-180px; left:-110px; background:var(--lime); }
    .orb.two { bottom:-190px; right:-170px; background:var(--bright); }
    .topbar {
      width:min(1360px,calc(100% - 56px)); min-height:88px; margin:auto;
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      border-bottom:1px solid rgba(255,255,255,.1); position:relative; z-index:10;
    }
    .brand { border:0; padding:10px 0; background:transparent; color:var(--white); cursor:pointer; text-align:left; }
    .brand strong { display:block; color:var(--lime); font-size:24px; line-height:.9; font-weight:950; letter-spacing:-.055em; }
    .brand span { color:var(--muted); font-size:9px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; }
    .ghost {
      min-height:46px; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.045);
      color:var(--white); border-radius:999px; padding:0 19px; cursor:pointer; font-weight:750;
      transition:180ms ease;
    }
    .ghost:hover { border-color:rgba(200,255,61,.7); background:rgba(200,255,61,.08); }
    .ghost:active { transform:scale(.97); }
    .eyebrow { margin:0 0 20px; color:var(--muted); font-size:11px; font-weight:850; letter-spacing:.18em; text-transform:uppercase; display:flex; align-items:center; gap:10px; }
    .eyebrow i { width:8px; height:8px; border-radius:50%; background:var(--lime); box-shadow:0 0 16px rgba(200,255,61,.85); }
    h1,.display { text-transform:uppercase; font-weight:950; letter-spacing:-.065em; line-height:.9; }
    .panel {
      background:radial-gradient(circle at 85% 10%,rgba(176,76,255,.14),transparent 31%),linear-gradient(145deg,rgba(32,19,54,.96),rgba(18,13,31,.98));
      border:1px solid rgba(176,76,255,.55); box-shadow:inset 0 1px rgba(255,255,255,.06),0 24px 80px rgba(0,0,0,.35),0 0 38px rgba(139,92,246,.09);
    }
    .setup {
      width:min(1240px,calc(100% - 56px)); min-height:calc(100svh - 88px); margin:auto;
      padding:64px 0 72px; display:grid; grid-template-columns:minmax(0,1.06fr) minmax(420px,.82fr); align-items:center; gap:86px;
    }
    .hero h1 { margin:0; max-width:720px; font-size:clamp(64px,7vw,112px); }
    .hero h1 span { color:var(--lime); text-shadow:0 0 34px rgba(200,255,61,.23); }
    .hero-copy { max-width:610px; margin:32px 0 0; color:var(--muted); font-size:18px; line-height:1.65; }
    .setup-side { min-width:0; display:grid; gap:16px; }
    .setup-card { border-radius:36px; padding:35px; }
    .mode-switch { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:28px; padding:5px; border:1px solid rgba(255,255,255,.12); border-radius:18px; background:rgba(3,2,8,.42); }
    .mode-switch button { min-height:48px; border:0; border-radius:13px; background:transparent; color:var(--muted); cursor:pointer; font-size:12px; font-weight:900; letter-spacing:.06em; text-transform:uppercase; }
    .mode-switch button.selected { background:linear-gradient(115deg,var(--lime),#dcff79); color:var(--ink); box-shadow:0 0 24px rgba(200,255,61,.16); }
    .card-title { display:flex; gap:15px; align-items:center; margin-bottom:28px; }
    .step { width:50px; height:50px; border:1px solid rgba(200,255,61,.46); background:rgba(200,255,61,.08); color:var(--lime); border-radius:15px; display:grid; place-items:center; font-family:ui-monospace,monospace; font-weight:850; }
    .card-title p { margin:0 0 3px; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.15em; font-weight:850; }
    .card-title h2 { margin:0; font-size:25px; }
    .names { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    label span,.rounds legend { display:block; margin:0 0 8px; color:var(--muted); font-size:11px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; }
    input { width:100%; height:58px; border:1px solid rgba(255,255,255,.13); border-radius:16px; background:rgba(3,2,8,.52); color:var(--white); padding:0 16px; font-size:17px; font-weight:750; }
    input:focus { border-color:var(--violet); background:rgba(3,2,8,.75); }
    .rounds { border:0; padding:0; margin:26px 0 29px; }
    .round-options { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .round-options button { height:50px; border:1px solid rgba(255,255,255,.13); border-radius:14px; background:rgba(3,2,8,.35); color:var(--muted); cursor:pointer; font-weight:850; }
    .round-options button.selected { border-color:var(--lime); background:var(--lime); color:var(--ink); box-shadow:0 0 24px rgba(200,255,61,.2); }
    .primary {
      width:100%; min-height:64px; border:0; border-radius:20px; background:var(--lime); color:#0b0a12;
      display:flex; align-items:center; justify-content:space-between; padding:0 24px; font-weight:900; font-size:17px;
      cursor:pointer; box-shadow:0 0 32px rgba(200,255,61,.18); transition:180ms ease;
    }
    .primary b { font-size:24px; }
    .primary:hover { transform:translateY(-2px); filter:brightness(1.05); box-shadow:0 10px 38px rgba(200,255,61,.22); }
    .primary:active { transform:scale(.98); }
    .fine { margin:14px 0 0; color:#766e85; text-align:center; font-size:10px; }
    .solo-facts { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:24px 0 27px; }
    .solo-fact { min-width:0; padding:13px 7px; border:1px solid rgba(255,255,255,.1); border-radius:14px; background:rgba(3,2,8,.34); text-align:center; }
    .solo-fact strong { display:block; color:var(--lime); font-size:19px; line-height:1; }
    .solo-fact span { display:block; margin-top:5px; color:var(--muted); font-size:8px; font-weight:850; letter-spacing:.1em; text-transform:uppercase; }
    .public-note { margin:13px 0 0; color:#8d849c; text-align:center; font-size:10px; line-height:1.45; }
    .center-screen { min-height:calc(100svh - 88px); width:min(780px,calc(100% - 40px)); margin:auto; padding:56px 0 72px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .turn-orbit { width:112px; height:112px; margin-bottom:30px; position:relative; border-radius:50%; display:grid; place-items:center; background:radial-gradient(circle,rgba(176,76,255,.28),rgba(9,6,17,.7)); border:1px solid rgba(176,76,255,.72); box-shadow:0 0 45px rgba(176,76,255,.22); }
    .turn-orbit::before,.turn-orbit::after { content:""; position:absolute; inset:-12px; border-radius:inherit; border:1px solid rgba(200,255,61,.13); }
    .turn-orbit::after { inset:-24px; border-color:rgba(176,76,255,.09); }
    .turn-orbit span { color:var(--lime); font-size:44px; font-weight:950; }
    .center-screen .eyebrow { justify-content:center; }
    .center-screen h1 { margin:0; font-size:clamp(58px,8vw,100px); }
    .center-screen h1 strong { color:var(--lime); font-weight:inherit; text-shadow:0 0 32px rgba(200,255,61,.23); }
    .center-screen > p:not(.eyebrow) { margin:25px auto 0; max-width:590px; color:var(--muted); font-size:17px; line-height:1.6; }
    .center-action { max-width:330px; margin-top:30px; }
    .center-screen small { margin-top:17px; color:#746d80; }
    .game { width:min(1296px,calc(100% - 56px)); min-height:calc(100svh - 88px); margin:auto; padding:38px 0 54px; }
    .game-head { display:flex; align-items:center; justify-content:space-between; gap:28px; margin-bottom:17px; }
    .game-head .eyebrow { margin:0; }
    .question-banner { position:relative; overflow:hidden; margin-bottom:26px; padding:27px 34px 30px; border:1px solid rgba(200,255,61,.32); border-radius:28px; background:radial-gradient(circle at 50% 0%,rgba(200,255,61,.1),transparent 48%),rgba(15,9,26,.76); text-align:center; box-shadow:inset 0 1px rgba(255,255,255,.05),0 18px 58px rgba(0,0,0,.24); }
    .question-banner::before { content:""; position:absolute; top:0; left:20%; right:20%; height:2px; background:linear-gradient(90deg,transparent,var(--lime),transparent); box-shadow:0 0 18px rgba(200,255,61,.55); }
    .question-label { display:block; color:var(--muted); font-size:10px; font-weight:900; letter-spacing:.18em; text-transform:uppercase; }
    .question-banner h1 { max-width:1020px; margin:10px auto 0; font-size:clamp(34px,4vw,58px); line-height:1.08; letter-spacing:-.045em; text-transform:none; }
    .question-banner .target-word { color:#cf82ff; text-shadow:0 0 24px rgba(176,76,255,.24); }
    .question-banner .known-word { color:var(--lime); text-shadow:0 0 24px rgba(200,255,61,.18); }
    .scores { flex:0 0 auto; display:flex; padding:5px; border:1px solid rgba(176,76,255,.55); border-radius:999px; background:rgba(15,9,26,.84); box-shadow:0 0 28px rgba(139,92,246,.13); }
    .score { min-width:146px; min-height:56px; border-radius:999px; padding:7px 16px; display:flex; align-items:center; justify-content:center; gap:15px; color:var(--muted); }
    .score.active { background:rgba(139,92,246,.18); color:var(--white); box-shadow:inset 0 0 0 1px rgba(176,76,255,.34); }
    .score span { max-width:84px; overflow:hidden; text-overflow:ellipsis; font-size:11px; font-weight:850; text-transform:uppercase; letter-spacing:.07em; }
    .score strong { color:var(--lime); font-size:26px; font-variant-numeric:tabular-nums; }
    .scores.solo .score { min-width:190px; }
    .solo-meta { display:flex; align-items:center; gap:10px; }
    .timer { width:132px; min-height:66px; position:relative; overflow:hidden; border:1px solid rgba(200,255,61,.48); border-radius:20px; background:rgba(15,9,26,.92); display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 0 26px rgba(200,255,61,.09); }
    .timer > span { color:var(--muted); font-size:8px; font-weight:900; letter-spacing:.14em; text-transform:uppercase; }
    .timer strong { margin-top:1px; color:var(--lime); font-size:29px; line-height:1; font-variant-numeric:tabular-nums; }
    .timer strong small { font-size:12px; }
    .timer-track { position:absolute; left:0; right:0; bottom:0; height:4px; background:rgba(255,255,255,.08); }
    .timer-track i { display:block; height:100%; width:100%; background:var(--lime); transform-origin:left; }
    .timer.urgent { border-color:var(--danger); box-shadow:0 0 28px rgba(255,87,118,.15); }
    .timer.urgent strong { color:#ff8ca3; }
    .timer.urgent .timer-track i { background:var(--danger); }
    .compare { display:grid; grid-template-columns:1fr 78px 1fr; align-items:stretch; }
    .fact { min-height:440px; border-radius:40px; padding:39px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:radial-gradient(circle at 50% 25%,rgba(139,92,246,.13),transparent 38%),linear-gradient(145deg,rgba(25,18,43,.94),rgba(13,9,23,.98)); box-shadow:0 28px 90px rgba(0,0,0,.32); }
    .fact.known { border:1px solid rgba(200,255,61,.82); box-shadow:0 0 28px rgba(200,255,61,.09),0 28px 90px rgba(0,0,0,.32); }
    .fact.mystery { border:1px solid rgba(176,76,255,.75); box-shadow:0 0 32px rgba(176,76,255,.1),0 28px 90px rgba(0,0,0,.32); }
    .fact.correct { border-color:var(--lime); box-shadow:0 0 40px rgba(200,255,61,.14),0 28px 90px rgba(0,0,0,.32); }
    .fact.wrong { border-color:var(--danger); box-shadow:0 0 40px rgba(255,87,118,.14),0 28px 90px rgba(0,0,0,.32); }
    .fact > p { margin:0 0 19px; color:var(--muted); font-size:10px; font-weight:850; letter-spacing:.16em; text-transform:uppercase; }
    .fact h2 { margin:0; font-size:clamp(38px,4vw,65px); line-height:1; letter-spacing:-.05em; }
    .number { margin-top:27px; font-size:clamp(76px,8vw,122px); line-height:.95; letter-spacing:-.04em; font-weight:950; font-variant-numeric:tabular-nums; }
    .number.lime { color:var(--lime); text-shadow:0 0 28px rgba(200,255,61,.22); }
    .number.violet { color:#c26bff; text-shadow:0 0 28px rgba(176,76,255,.25); }
    .unit { margin-top:3px; color:var(--muted); font-size:15px; }
    .vs { width:74px; height:74px; align-self:center; justify-self:center; z-index:2; border-radius:50%; border:1px solid rgba(176,76,255,.9); background:#140b24; display:grid; place-items:center; font-size:23px; font-weight:950; box-shadow:0 0 26px rgba(176,76,255,.42),inset 0 0 18px rgba(176,76,255,.2); }
    .guess-grid { width:min(100%,440px); margin-top:36px; display:grid; gap:15px; }
    .guess { min-height:86px; border-radius:25px; padding:0 25px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; text-transform:uppercase; font-size:29px; letter-spacing:-.025em; font-weight:950; transition:180ms ease; }
    .guess:hover { transform:translateY(-3px); filter:brightness(1.07); }
    .guess:active { transform:scale(.98); }
    .guess b { font-size:37px; }
    .higher { border:1px solid #e7ff9b; background:linear-gradient(115deg,#b8f427,#d7ff68); color:#0b0a12; box-shadow:0 0 28px rgba(200,255,61,.21); }
    .lower { border:1px solid #cc85ff; background:linear-gradient(115deg,#7928e8,#b129ff); color:var(--white); box-shadow:0 0 28px rgba(176,76,255,.22); }
    .answer { width:100%; display:flex; flex-direction:column; align-items:center; animation:answer .36s cubic-bezier(.2,.8,.2,1) both; }
    .chip { margin-top:21px; padding:8px 14px; border-radius:999px; font-size:11px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    .chip.right { background:rgba(200,255,61,.12); border:1px solid rgba(200,255,61,.45); color:var(--lime); }
    .chip.miss { background:rgba(255,87,118,.1); border:1px solid rgba(255,87,118,.44); color:#ff8ca3; }
    .next { width:min(100%,360px); min-height:58px; margin-top:23px; padding:0 18px; border:1px solid rgba(255,255,255,.23); border-radius:18px; background:rgba(255,255,255,.07); color:var(--white); display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-weight:780; }
    .next:hover { border-color:var(--lime); }
    .progress { width:min(460px,100%); margin:27px auto 0; text-align:center; }
    .track { height:4px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,.1); }
    .track i { display:block; height:100%; border-radius:inherit; background:linear-gradient(90deg,var(--violet),var(--lime)); transition:width .5s ease; }
    .progress p { margin:10px 0 0; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.09em; }
    .progress strong { color:var(--lime); }
    .trophy { width:108px; height:108px; margin-bottom:29px; border-radius:33px; display:grid; place-items:center; background:var(--lime); color:var(--ink); font-size:44px; transform:rotate(5deg); box-shadow:0 0 44px rgba(200,255,61,.22); }
    .results h1 { color:var(--lime); }
    .final-scores { width:min(650px,100%); margin-top:34px; padding:9px; border-radius:32px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .final-player { min-width:0; border-radius:24px; padding:24px; }
    .final-player.winner { background:rgba(200,255,61,.08); box-shadow:inset 0 0 0 1px rgba(200,255,61,.26); }
    .final-player > span { color:var(--muted); font-size:9px; text-transform:uppercase; letter-spacing:.15em; font-weight:850; }
    .final-player h2 { margin:8px 0 9px; overflow:hidden; text-overflow:ellipsis; font-size:24px; }
    .final-player strong { display:block; color:var(--lime); font-size:60px; line-height:1; font-weight:950; }
    .final-player small { color:var(--muted); }
    .result-actions { width:min(650px,100%); display:grid; grid-template-columns:1.25fr 1fr; gap:12px; margin-top:17px; }
    .secondary { min-height:64px; border-radius:20px; }
    .solo-results { width:min(920px,calc(100% - 40px)); min-height:calc(100svh - 88px); margin:auto; padding:52px 0 72px; display:grid; gap:19px; }
    .solo-result-card { border-radius:34px; padding:35px; text-align:center; }
    .solo-result-card .eyebrow { justify-content:center; }
    .solo-result-card h1 { margin:0; color:var(--lime); font-size:clamp(54px,8vw,92px); }
    .solo-result-card > p:not(.eyebrow) { max-width:570px; margin:18px auto 0; color:var(--muted); line-height:1.55; }
    .solo-stats { width:min(620px,100%); margin:29px auto 0; display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
    .solo-stat { padding:17px 10px; border:1px solid rgba(255,255,255,.1); border-radius:17px; background:rgba(3,2,8,.3); }
    .solo-stat strong { display:block; color:var(--white); font-size:22px; }
    .solo-stat span { display:block; margin-top:4px; color:var(--muted); font-size:8px; font-weight:850; letter-spacing:.1em; text-transform:uppercase; }
    .submission-status { min-height:20px; margin:17px 0 0; color:var(--muted); font-size:11px; }
    .submission-status.good { color:var(--lime); }
    .submission-status.warn { color:#ffb0bf; }
    .solo-actions { width:min(620px,100%); margin:17px auto 0; display:grid; grid-template-columns:1.2fr 1fr; gap:10px; }
    .leaderboard { border-radius:30px; padding:25px; }
    .leaderboard-head { display:flex; align-items:end; justify-content:space-between; gap:18px; margin-bottom:16px; }
    .leaderboard-head p { margin:0 0 4px; color:var(--muted); font-size:9px; font-weight:850; letter-spacing:.13em; text-transform:uppercase; }
    .leaderboard-head h2 { margin:0; font-size:25px; }
    .leaderboard-head span { color:var(--muted); font-size:10px; text-align:right; }
    .leaderboard-list { display:grid; gap:6px; }
    .leaderboard-row { min-height:45px; display:grid; grid-template-columns:36px minmax(0,1fr) auto; align-items:center; gap:10px; padding:0 13px; border:1px solid rgba(255,255,255,.08); border-radius:13px; background:rgba(3,2,8,.28); }
    .leaderboard-row.current { border-color:rgba(200,255,61,.55); background:rgba(200,255,61,.07); }
    .leaderboard-rank { color:var(--muted); font-family:ui-monospace,monospace; font-size:11px; }
    .leaderboard-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; font-weight:800; }
    .leaderboard-score { color:var(--lime); font-size:15px; font-weight:950; font-variant-numeric:tabular-nums; }
    .leaderboard-empty { padding:22px 10px; color:var(--muted); text-align:center; font-size:12px; }

      const correct=choice!=="timeout"&&(choice==="higher"?fact.target.value>fact.known.value:fact.target.value<fact.known.value);
      state.guess=choice;state.correct=correct;
      if(solo){state.timeLeft=Math.max(0,ROUND_MS-elapsed);state.roundPoints=pointsFor(elapsed,correct);state.players[0].score+=state.roundPoints;state.answerTimes.push(Math.round(elapsed));state.correctFlags.push(correct);}else if(correct)state.players[state.active].score++;
      buzz(correct);render();
    }
    function next(){
      clearRoundTimer();if(state.round+1>=state.rounds){state.screen="results";render();if(state.mode==="solo")void submitSoloScore();return;}
      state.round++;state.guess=null;state.correct=null;state.roundPoints=0;state.timeLeft=ROUND_MS;
      if(state.mode==="solo")beginRound();else{state.active=state.active?0:1;state.screen="handoff";render();}
    }
    function rematch(){
      clearRoundTimer();state.players.forEach(p=>p.score=0);state.starter=state.mode==="solo"?0:(state.starter?0:1);state.deck=makeDeck();state.round=0;state.active=state.starter;state.guess=null;state.correct=null;state.roundPoints=0;state.timeLeft=ROUND_MS;state.answerTimes=[];state.correctFlags=[];state.scoreSubmitted=false;state.submissionId=null;state.submitStatus="idle";state.screen="handoff";render();
    }
    function bind(){
      document.querySelectorAll("[data-action]").forEach(el=>el.addEventListener("click",event=>{
        const action=el.dataset.action;
        if(action==="home"){clearRoundTimer();state.screen="setup";state.rules=false;render();if(state.mode==="solo")void loadLeaderboard();}
        if(action==="rules"){state.rules=true;render();}
        if(action==="close-rules"){if(event.target===el||el.classList.contains("close")||el.classList.contains("primary")){state.rules=false;render();}}
        if(action==="ready")beginRound();
        if(action==="next")next(); if(action==="rematch")rematch();
      }));
      document.querySelectorAll("[data-mode]").forEach(el=>el.addEventListener("click",()=>{clearRoundTimer();state.mode=el.dataset.mode;state.rounds=state.mode==="solo"?SOLO_ROUNDS:state.rounds;state.screen="setup";render();if(state.mode==="solo")void loadLeaderboard();}));
      document.querySelectorAll("[data-round]").forEach(el=>el.addEventListener("click",()=>{state.rounds=Number(el.dataset.round);render();}));
      document.querySelectorAll("[data-guess]").forEach(el=>el.addEventListener("click",()=>makeGuess(el.dataset.guess)));
      const form=document.getElementById("setup-form"); if(form){
        const one=document.getElementById("player-one"),two=document.getElementById("player-two");
        one.addEventListener("input",()=>state.draftNames[0]=one.value);if(two)two.addEventListener("input",()=>state.draftNames[1]=two.value);
        form.addEventListener("submit",event=>{event.preventDefault();state.draftNames=[one.value,two?two.value:state.draftNames[1]];start();});
      }
    }
    render();
    if(state.mode==="solo")void loadLeaderboard();
  </script>
</body>
</html>
